// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    repositories {
        google()
        mavenCentral()  // Must have for Spotify SDK and AsyncStorage
        jcenter()       // Optional, some legacy deps
    }
    dependencies {
        classpath('com.android.tools.build:gradle:8.1.1') // specify version
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0') // match your Kotlin version
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()  // Required
        jcenter()       // optional
        maven { url 'https://www.jitpack.io' }  // keep JitPack if needed
    }
}

// Expo plugins
apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"